# Project requires MacOS to build - run pytest pre-commit

name: Pytest and Codecov

on:
  push:
  pull_request:
    types: [opened]

jobs:
  pytest:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ptest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests with pytest
        run: |
          pytest --cov --cov-branch --cov-report=xml 
      - name: Zip Test Artifacts
        if: always() # Ensures reports are zipped even if tests fail
        run: zip -qq -r tests.zip .tests

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always() # Ensures reports are uploaded even if tests fail
        with:
          name: test_results-${{ matrix.python-version }}
          path: tests.zip # Path to your test output
          retention-days: 5  # Optional: default is 90 days
      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ matrix.python-version == '3.13' && always() }} # Only upload once, after the last Python version runs
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
